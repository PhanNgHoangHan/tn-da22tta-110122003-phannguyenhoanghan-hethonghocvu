<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dashboard Học Vụ</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .login-logo .icon { font-size: 48px; }
        .login-logo h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin: 8px 0 4px; }
        .login-logo p { color: #64748b; font-size: 13px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .btn-login { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-login:hover { background: #1d4ed8; }
        .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <img src="/static/img/logo_tvu.png" alt="TVU Logo"
                 style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:10px">
            <h1>Đại học Trà Vinh</h1>
            <p>Hệ thống Dashboard phân tích kết quả học tập & cảnh báo học vụ</p>
        </div>

        {% if form.errors %}
        <div class="error-msg">❌ Tên đăng nhập hoặc mật khẩu không đúng.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Tên đăng nhập</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn-login">🔐 Đăng nhập</button>
        </form>
    </div>
</body>
</html>
