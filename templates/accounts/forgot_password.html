<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy lại mật khẩu - Hệ thống Quản lý Học vụ | Đại học Trà Vinh</title>
    <link rel="icon" type="image/png" href="/static/img/logo_tvu.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: #ffffff;
            border: 1px solid #cce3f5;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(15, 37, 64, 0.08);
            overflow: hidden;
        }

        /* Card Header */
        .card-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border-bottom: 2px solid #3498db;
        }

        .card-header-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
        }

        /* Card Body */
        .card-body {
            padding: 28px 32px;
        }

        /* Form Row */
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
        }

        .form-label {
            width: 280px;
            font-size: 14px;
            color: #2c3e50;
            font-weight: 500;
            padding-right: 20px;
        }

        .form-input-container {
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        .input-group-addon {
            background: #f1f5f9;
            border: 1.5px solid #cbd5e1;
            border-right: none;
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
            width: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        .form-control {
            flex: 1;
            padding: 11px 16px;
            font-size: 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            background: #f8fafc;
            color: #0f2540;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        /* Input inside group has rounded corners on right only */
        .form-input-container .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            background: #ffffff;
            box-shadow: 0 0 0 3.5px rgba(52, 152, 219, 0.15);
        }

        /* Dropdown style custom styling */
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='none' stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 12px 12px;
            padding-right: 40px;
        }

        /* Footer buttons */
        .card-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 32px 28px;
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 28px;
            background: #ffffff;
            border: 1.5px solid #3498db;
            border-radius: 6px;
            color: #3498db;
            font-size: 14.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #ebf5fb;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
            transform: translateY(-0.5px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit svg {
            fill: #3498db;
        }

        /* Alert message styling */
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 22px;
            font-size: 13.5px;
            width: 100%;
        }

        .back-to-login {
            display: inline-block;
            margin-top: 16px;
            font-size: 13.5px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-to-login:hover {
            color: #2e93d8;
            text-decoration: underline;
        }

        /* Responsive styling */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .form-label {
                width: 100%;
                padding-right: 0;
            }
            .form-input-container {
                width: 100%;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Card Header -->
        <div class="card-header">
            <div class="card-header-icon">
                <!-- User with lock icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#3498db" class="bi bi-person-fill-lock" viewBox="0 0 16 16">
                    <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm-9 8c0 1 1 1 1 1h5.256A4.493 4.493 0 0 1 8 12.5a4.5 4.5 0 0 1 3.544-4.393C10.883 7.551 9.487 7.5 9 7.5c-5 0-6 3-6 4Zm14-1.5v-1a1.5 1.5 0 0 0-3 0v1a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1Zm-1 0h-1v-1a.5.5 0 0 1 1 0v1Z"/>
                </svg>
            </div>
            <div class="card-header-title">Lấy lại mật khẩu</div>
        </div>

        <!-- Card Body -->
        <div class="card-body">
            {% if error_msg %}
            <div class="alert-error">
                {{ error_msg }}
            </div>
            {% endif %}

            <form method="post" id="forgot-password-form">
                {% csrf_token %}
                
                <!-- Send Method (Dropdown) -->
                <div class="form-row">
                    <div class="form-label">Hình thức gửi code xác minh</div>
                    <div class="form-input-container">
                        <select class="form-control" name="send_method" id="send_method">
                            <option value="email" selected>Qua Email</option>
                        </select>
                    </div>
                </div>

                <!-- Username Input (Tài khoản) -->
                <div class="form-row">
                    <div class="form-label">Tài khoản</div>
                    <div class="form-input-container">
                        <div class="input-group-addon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                                <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                            </svg>
                        </div>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Nhập tên đăng nhập..." required autocomplete="username" autofocus>
                    </div>
                </div>

                <!-- Email Input (Email đăng ký) -->
                <div class="form-row">
                    <div class="form-label">Email đã đăng ký trong hệ thống</div>
                    <div class="form-input-container">
                        <div class="input-group-addon" style="font-size: 15px; font-weight: 500;">@</div>
                        <input type="email" name="email" id="email" class="form-control" placeholder="Nhập email đã đăng ký..." required autocomplete="email">
                    </div>
                </div>

                <!-- Footer Submit Button inside form tag to allow submit -->
                <div class="card-footer">
                    <button type="submit" class="btn-submit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-send-fill" viewBox="0 0 16 16">
                            <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                        </svg>
                        Gửi
                    </button>
                    <a href="{% url 'accounts:login' %}" class="back-to-login">← Quay lại trang đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
