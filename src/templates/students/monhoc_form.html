{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="form-card" style="max-width:500px">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:#dc2626;font-size:12px;margin-top:4px">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="{% url 'students:monhoc_list' %}" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
